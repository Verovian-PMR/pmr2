version: "3.9"

services:
  # PostgreSQL - Data Plane (Dev instance)
  postgres:
    image: postgres:16-alpine
    container_name: vivipractice-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vivipractice
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: vivipractice_dev
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vivipractice"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - S3-compatible object storage
  minio:
    image: minio/minio:latest
    container_name: vivipractice-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
